  <polygon points="120,200 123,208 132,209 125,215 127,224 120,219 113,224 115,215 108,209 117,208" fill="#fbbf24" />
  <polygon points="392,200 395,208 404,209 397,215 399,224 392,219 385,224 387,215 380,209 389,208" fill="#fbbf24" />

  <circle cx="256" cy="256" r="180" fill="none" stroke="#a3e635" stroke-width="4" stroke-opacity="0.15" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#a3e635" stroke-width="2" stroke-opacity="0.08" />

  <!-- Tennis Ball Core -->
  <circle cx="256" cy="256" r="150" fill="#c2fb34" />

  <!-- Tennis Ball Seams (White/Subtle Grey curved lines) -->
  <path d="M 150 150 A 150 150 0 0 1 362 362" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-dasharray="1 1" opacity="0.9" />
  <path d="M 150 150 A 150 150 0 0 1 362 362" fill="none" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" />
  

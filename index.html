<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <!-- Prevent zoom and optimize for mobile portrait layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>Vua Tennis Bịp 2026</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    
    <!-- Apple Native PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vua Tennis Bịp" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    
    <!-- Primary Font Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-black text-white antialiased selection:bg-lime-400 selection:text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
    
    <!-- Active Service Worker Registration for Offline capability -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('PWA Service Worker registered successfully with scope:', reg.scope))
            .catch((err) => console.error('PWA Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
